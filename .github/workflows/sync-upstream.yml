name: Sync upstream

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync feature branch from upstream main ignoring README files
        shell: bash
        run: |
          set -euo pipefail
          TARGET_BRANCH="feature/search-enhancements"
          BASE_BRANCH="main"
          UPSTREAM_REPO="https://github.com/router-for-me/CLIProxyAPI.git"
          IGNORED_READMES=("README.md" "README_CN.md" "README_JA.md")

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "${UPSTREAM_REPO}"
          git fetch --prune origin "${TARGET_BRANCH}"
          git fetch --prune upstream "${BASE_BRANCH}"
          git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          before_sync="$(git rev-parse HEAD)"

          set +e
          git merge --no-ff --no-commit "upstream/${BASE_BRANCH}"
          merge_code=$?
          set -e

          if [ "${merge_code}" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U || true)"
            non_readme_conflicts="$(
              printf '%s\n' "${conflicts}" \
                | grep -Ev '^(README|README_CN|README_JA)\.md$' \
                || true
            )"
            if [ -n "${non_readme_conflicts}" ]; then
              echo "::error::Non-README merge conflicts found:"
              echo "${non_readme_conflicts}"
              git merge --abort || true
              exit 1
            fi
            echo "Only README conflicts found. Restoring README files from ${TARGET_BRANCH} before sync."
          fi

          for file in "${IGNORED_READMES[@]}"; do
            if git cat-file -e "${before_sync}:${file}" 2>/dev/null; then
              git restore --source="${before_sync}" --staged --worktree -- "${file}"
              git add "${file}"
            else
              git rm -f --ignore-unmatch -- "${file}"
            fi
          done

          remaining_conflicts="$(git diff --name-only --diff-filter=U || true)"
          if [ -n "${remaining_conflicts}" ]; then
            echo "::error::Unresolved conflicts remain:"
            echo "${remaining_conflicts}"
            git merge --abort || true
            exit 1
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No non-README upstream changes to sync."
            git merge --abort 2>/dev/null || true
            exit 0
          fi

          git commit -m "chore: sync upstream main into ${TARGET_BRANCH}"
          git push origin "${TARGET_BRANCH}"
